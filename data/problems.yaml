# =============================================================================
#  THE UNSOLVED MATHEMATICS ATLAS — CANONICAL PROBLEM REGISTRY
# =============================================================================
#  This file is the SINGLE SOURCE OF TRUTH for the entire atlas.
#  Every problem subfolder, the master ranking, the RAG corpus, the Kanban
#  board, and the ER model are generated/validated from this file.
#
#  Ranking is computed, not hand-assigned. See docs/methodology/RANKING.md.
#  Composite Severity Score (CSS), higher = "harder + older + more central":
#
#      CSS = 0.40 * difficulty
#          + 0.30 * centrality
#          + 0.20 * age_score          (age_score = clamp((2025 - year_posed)/3, 0, 100))
#          + 0.10 * (100 - tractability)   (less tractable -> higher CSS)
#
#  Fields are validated against schema/problem.schema.json by scripts/validate.py
#  All scores are on a 0-100 scale and are *curated editorial estimates*,
#  documented and falsifiable — not claims of objective truth.
# =============================================================================

meta:
  atlas_name: "The Unsolved Mathematics Atlas"
  version: "0.1.0"
  maintainer: "0thernes"
  updated: "2026-06-14"
  default_branch: "main"
  disclaimer: >
    Difficulty, centrality, age, and tractability scores are curated editorial
    estimates intended to produce a useful, reproducible ordering — NOT objective
    measurements. Paper and people lists are research scaffolding: each is marked
    with a verification status and MUST be checked against primary sources before
    citation. Nothing here asserts a problem is solved unless explicitly stated.

